<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE JOURNAL | Recipes & Travel Log</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #FDFCF9;
            --accent: #6B705C; /* Sage */
            --stone-300: #D6D3D1;
            --text-main: #1C1917;
        }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-color); color: var(--text-main); }
        h1, h2, h3, .serif { font-family: 'Playfair Display', serif; }
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }
        .card-anim { transition: transform 0.4s ease, box-shadow 0.4s ease; border: 1px solid transparent; }
        .card-anim:hover { transform: translateY(-10px); border-color: #E7E5E4; background: white; box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.05); }
        input:focus { border-color: #6B705C; outline: none; }
        .modal-animate { animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes slideUp { from { transform: translateY(50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .active-tab { border-bottom: 2px solid var(--accent); color: var(--text-main) !important; }
        .step-num { -webkit-text-stroke: 1px #6B705C; color: transparent; opacity: 0.1; font-size: 6rem; font-weight: 900; }
        .star-filled { color: var(--accent); }
        .star-empty { color: #E7E5E4; }
        .maps-btn { background: var(--text-main); color: white; transition: all 0.3s ease; }
        .maps-btn:hover { background: var(--accent); transform: scale(1.05); }
    </style>
</head>
<body class="antialiased">

    <!-- Top Navigation -->
    <nav class="p-8 flex justify-between items-center border-b border-stone-100 sticky top-0 bg-white/90 glass z-40">
        <div class="text-2xl font-bold tracking-tighter uppercase serif">The Journal</div>
        <div class="hidden md:flex space-x-8 text-xs font-semibold tracking-widest uppercase text-stone-400">
            <button id="tab-recipes" onclick="switchView('recipes')" class="hover:text-stone-900 transition active-tab">Master Recipes</button>
            <button id="tab-spots" onclick="switchView('spots')" class="hover:text-stone-900 transition">Travel Log</button>
        </div>
    </nav>

    <!-- Header -->
    <header class="max-w-4xl mx-auto pt-24 pb-12 px-6 text-center">
        <h1 id="mainTitle" class="text-6xl md:text-8xl mb-6 tracking-tighter">71 Master Recipes</h1>
        <p id="mainSubtitle" class="text-xl text-stone-500 font-light mb-12 italic">Technique-driven culinary archive.</p>
        
        <!-- Adaptive Filter Bar -->
        <div class="flex justify-center items-center space-x-4 mb-12 text-[10px] uppercase tracking-[0.3em] font-bold text-stone-400">
            <div id="recipeFilters" class="flex space-x-4">
                <button onclick="filterItems('all')" class="hover:text-stone-900">All</button>
                <span>/</span>
                <button onclick="filterItems('Breakfast')" class="hover:text-stone-900">Morning</button>
                <span>/</span>
                <button onclick="filterItems('Main')" class="hover:text-stone-900">Mains</button>
                <span>/</span>
                <button onclick="filterItems('Dessert')" class="hover:text-stone-900">Sweets</button>
            </div>
            <div id="spotFilters" class="hidden flex space-x-4">
                <button onclick="filterItems('all')" class="hover:text-stone-900">All Spots</button>
                <span>/</span>
                <button onclick="filterItems('Exclusive')" class="hover:text-stone-900">Exclusive</button>
                <span>/</span>
                <button onclick="filterItems('Burger')" class="hover:text-stone-900">Burgers</button>
                <span>/</span>
                <button onclick="filterItems('Busted')" class="hover:text-stone-900">Review Busters</button>
            </div>
        </div>

        <div class="relative max-w-xl mx-auto border-b border-stone-200">
            <input type="text" id="searchInput" onkeyup="search()" placeholder="Search archives..." 
                   class="w-full py-4 px-2 text-xl bg-transparent transition duration-500 text-center font-light italic">
        </div>
    </header>

    <!-- Main Grid -->
    <main class="max-w-7xl mx-auto px-6 py-12">
        <div id="mainGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-x-12 gap-y-20"></div>
    </main>

    <!-- Detail Modal -->
    <div id="detailModal" class="fixed inset-0 z-50 hidden overflow-y-auto">
        <div class="min-h-screen glass flex items-center justify-center p-4">
            <div class="bg-white max-w-6xl w-full shadow-2xl rounded-3xl overflow-hidden relative modal-animate">
                <button onclick="closeModal()" class="absolute top-8 right-8 text-stone-300 hover:text-stone-900 text-5xl font-light z-50">&times;</button>
                <div id="modalContent"></div>
            </div>
        </div>
    </div>

    <footer class="py-20 text-center border-t border-stone-100 mt-20">
        <p class="serif italic text-2xl text-stone-300 uppercase tracking-widest">Fin.</p>
    </footer>

    <script src="scripts.js"></script>
</body>
</html>
